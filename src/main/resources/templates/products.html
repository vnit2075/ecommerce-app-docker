<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${keyword != null ? 'Search: ' + keyword : (selectedCategory != null ? selectedCategory.name : 'All Products')} + ' | ShopEZ'">Products | ShopEZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1 class="page-title" th:text="${keyword != null ? 'Results for: &quot;' + keyword + '&quot;' : (selectedCategory != null ? selectedCategory.name : 'All Products')}">Products</h1>
        <p class="page-subtitle" th:text="${products.totalElements} + ' products found'">0 products found</p>
    </div>
</div>

<div class="container products-page-layout">
    <!-- Sidebar Filters -->
    <aside class="sidebar">
        <div class="sidebar-card">
            <h3 class="sidebar-title"><i class="bi bi-funnel"></i> Categories</h3>
            <ul class="sidebar-list">
                <li><a href="/products" th:classappend="${selectedCategory == null and keyword == null} ? 'active' : ''">
                    <i class="bi bi-grid"></i> All Products
                </a></li>
                <li th:each="cat : ${categories}">
                    <a th:href="@{'/category/' + ${cat.id}}"
                       th:classappend="${selectedCategory?.id == cat.id} ? 'active' : ''">
                        <i class="bi bi-tag"></i>
                        <span th:text="${cat.name}">Category</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Sort -->
        <div class="sidebar-card">
            <h3 class="sidebar-title"><i class="bi bi-sort-down"></i> Sort By</h3>
            <div class="sort-options">
                <a th:href="@{/products(keyword=${keyword},categoryId=${selectedCategory?.id},sortBy='createdAt')}"
                   th:classappend="${param.sortBy == null or param.sortBy == 'createdAt'} ? 'sort-btn active' : 'sort-btn'">Newest</a>
                <a th:href="@{/products(keyword=${keyword},categoryId=${selectedCategory?.id},sortBy='price')}"
                   th:classappend="${param.sortBy == 'price'} ? 'sort-btn active' : 'sort-btn'">Price ↑</a>
                <a th:href="@{/products(keyword=${keyword},categoryId=${selectedCategory?.id},sortBy='name')}"
                   th:classappend="${param.sortBy == 'name'} ? 'sort-btn active' : 'sort-btn'">Name</a>
            </div>
        </div>
    </aside>

    <!-- Products Grid -->
    <main class="products-main">
        <!-- Search bar -->
        <form action="/products" method="get" class="products-search-bar">
            <input type="text" name="keyword" placeholder="Search within results..."
                   th:value="${keyword}" class="search-input">
            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Search</button>
        </form>

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="products-grid" th:if="${products.content.size() > 0}">
            <div th:each="product : ${products.content}" class="product-card">
                <div class="product-image-wrap">
                    <a th:href="@{'/products/' + ${product.id}}">
                        <img th:src="${product.imageUrl}" th:alt="${product.name}" class="product-img"
                             onerror="this.src='/images/no-image.png'">
                    </a>
                    <div class="product-badges">
                        <span th:if="${product.discountPrice != null}" class="badge badge-sale">SALE</span>
                        <span th:if="${!product.inStock}" class="badge badge-out">Out of Stock</span>
                    </div>
                    <div class="product-overlay">
                        <a th:href="@{'/products/' + ${product.id}}" class="overlay-btn">
                            <i class="bi bi-eye"></i> Quick View
                        </a>
                    </div>
                </div>
                <div class="product-info">
                    <span class="product-category" th:text="${product.category?.name}">Category</span>
                    <a th:href="@{'/products/' + ${product.id}}" class="product-name" th:text="${product.name}">Product</a>
                    <span class="product-brand" th:text="${product.brand}">Brand</span>
                    <div class="product-price-row">
                        <div class="price-group">
                            <span class="price-current" th:text="'₹' + ${#numbers.formatDecimal(product.effectivePrice, 1, 'COMMA', 0, 'POINT')}">₹0</span>
                            <span th:if="${product.discountPrice != null}" class="price-original"
                                  th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}"></span>
                        </div>
                        <form th:action="@{/cart/add}" method="post" class="add-cart-form">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <input type="hidden" name="quantity" value="1">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-add-cart" th:disabled="${!product.inStock}">
                                <i class="bi bi-bag-plus"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${products.content.size() == 0}" class="empty-state">
            <i class="bi bi-search"></i>
            <h3>No products found</h3>
            <p th:if="${keyword != null}">No results for "<strong th:text="${keyword}"></strong>". Try a different search.</p>
            <p th:unless="${keyword != null}">No products in this category yet.</p>
            <a href="/products" class="btn btn-primary">Browse All Products</a>
        </div>

        <!-- Pagination -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a th:if="${currentPage > 0}"
               th:href="@{/products(keyword=${keyword},categoryId=${selectedCategory?.id},page=${currentPage - 1})}"
               class="page-btn"><i class="bi bi-chevron-left"></i></a>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/products(keyword=${keyword},categoryId=${selectedCategory?.id},page=${i})}"
                   th:text="${i + 1}"
                   th:classappend="${currentPage == i} ? 'page-btn active' : 'page-btn'"></a>
            </span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/products(keyword=${keyword},categoryId=${selectedCategory?.id},page=${currentPage + 1})}"
               class="page-btn"><i class="bi bi-chevron-right"></i></a>
        </div>
    </main>
</div>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
