<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ShopEZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-brand">
        <a href="/" class="auth-logo">
            <span class="brand-icon"><i class="bi bi-bag-heart-fill"></i></span>
            <span class="brand-text">ShopEZ</span>
        </a>
        <p class="auth-tagline">Join millions of happy shoppers</p>
    </div>

    <div class="auth-card">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Sign up to start shopping</p>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${user}" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label class="form-label" for="fullName">Full Name</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-person"></i></span>
                    <input type="text" th:field="*{fullName}" id="fullName" class="form-input"
                           placeholder="John Doe" required>
                </div>
                <span th:if="${#fields.hasErrors('fullName')}" class="field-error" th:errors="*{fullName}"></span>
            </div>
            <div class="form-group">
                <label class="form-label" for="regEmail">Email Address</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-envelope"></i></span>
                    <input type="email" th:field="*{email}" id="regEmail" class="form-input"
                           placeholder="you@example.com" required>
                </div>
                <span th:if="${#fields.hasErrors('email')}" class="field-error" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-telephone"></i></span>
                    <input type="tel" th:field="*{phone}" id="phone" class="form-input"
                           placeholder="9876543210" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="regPassword">Password</label>
                <div class="input-group">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" th:field="*{password}" id="regPassword" class="form-input"
                           placeholder="Min. 6 characters" required minlength="6">
                    <button type="button" class="input-toggle" onclick="togglePassword('regPassword', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <span th:if="${#fields.hasErrors('password')}" class="field-error" th:errors="*{password}"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="bi bi-person-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-footer">
            <span>Already have an account?</span>
            <a href="/login" class="auth-link">Sign In</a>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
