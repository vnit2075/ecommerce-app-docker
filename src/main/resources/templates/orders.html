<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | ShopEZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="bi bi-box-seam"></i> My Orders</h1>
    </div>
</div>

<div class="container orders-page">
    <div th:if="${orders != null and !orders.isEmpty()}" class="orders-list">
        <div th:each="order : ${orders}" class="order-card">
            <div class="order-card-header">
                <div class="order-info">
                    <span class="order-number" th:text="${order.orderNumber}">ORD-000</span>
                    <span class="order-date" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy, HH:mm')}">Date</span>
                </div>
                <div class="order-meta">
                    <span class="order-status" th:classappend="'status-' + ${order.status.name().toLowerCase()}"
                          th:text="${order.status}">PENDING</span>
                    <span class="order-total" th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}">₹0</span>
                </div>
            </div>
            <div class="order-items-preview">
                <div th:each="item : ${order.items}" class="order-item-preview">
                    <img th:src="${item.productImageUrl}" th:alt="${item.productName}" class="order-item-img"
                         onerror="this.src='/images/no-image.png'">
                    <div class="order-item-info">
                        <span th:text="${item.productName}">Product</span>
                        <span class="order-item-qty" th:text="'Qty: ' + ${item.quantity}">Qty: 1</span>
                        <span th:text="'₹' + ${#numbers.formatDecimal(item.totalPrice, 1, 'COMMA', 0, 'POINT')}">₹0</span>
                    </div>
                </div>
            </div>
            <div class="order-card-footer">
                <div class="shipping-info">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${order.shippingAddress + ', ' + order.shippingCity + ', ' + order.shippingState}">Address</span>
                </div>
                <a th:href="@{'/orders/' + ${order.id}}" class="btn btn-outline btn-sm">
                    View Details <i class="bi bi-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>

    <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
        <i class="bi bi-box-seam"></i>
        <h2>No orders yet</h2>
        <p>You haven't placed any orders. Start shopping now!</p>
        <a href="/products" class="btn btn-primary btn-lg">
            <i class="bi bi-bag-plus"></i> Shop Now
        </a>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
