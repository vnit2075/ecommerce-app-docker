<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ShopEZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="page-header">
    <div class="container">
        <h1 class="page-title"><i class="bi bi-bag"></i> Shopping Cart</h1>
        <p class="page-subtitle" th:if="${cart != null}" th:text="${cart.totalItems} + ' item(s) in your cart'"></p>
    </div>
</div>

<div class="container cart-layout" th:if="${cart != null and !cart.items.isEmpty()}">
    <!-- Cart Items -->
    <div class="cart-items">
        <div th:each="item : ${cart.items}" class="cart-item">
            <div class="cart-item-img-wrap">
                <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}" class="cart-item-img"
                     onerror="this.src='/images/no-image.png'">
            </div>
            <div class="cart-item-details">
                <a th:href="@{'/products/' + ${item.product.id}}" class="cart-item-name" th:text="${item.product.name}">Product</a>
                <span class="cart-item-brand" th:if="${item.product.brand}" th:text="${item.product.brand}">Brand</span>
                <span class="cart-item-category" th:if="${item.product.category}" th:text="${item.product.category.name}">Category</span>
            </div>
            <div class="cart-item-price">
                <span th:text="'₹' + ${#numbers.formatDecimal(item.product.effectivePrice, 1, 'COMMA', 0, 'POINT')}">₹0</span>
                <span th:if="${item.product.discountPrice != null}" class="price-original"
                      th:text="'₹' + ${#numbers.formatDecimal(item.product.price, 1, 'COMMA', 0, 'POINT')}"></span>
            </div>
            <div class="cart-item-qty">
                <form th:action="@{/cart/update}" method="post" class="qty-form">
                    <input type="hidden" name="cartItemId" th:value="${item.id}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="quantity-selector">
                        <button type="button" class="qty-btn" th:attr="onclick='updateQty(this, -1, ' + ${item.product.stockQuantity} + ')'">−</button>
                        <input type="number" name="quantity" th:value="${item.quantity}" min="1"
                               th:max="${item.product.stockQuantity}" class="qty-input" onchange="this.form.submit()">
                        <button type="button" class="qty-btn" th:attr="onclick='updateQty(this, 1, ' + ${item.product.stockQuantity} + ')'">+</button>
                    </div>
                </form>
            </div>
            <div class="cart-item-subtotal">
                <span th:text="'₹' + ${#numbers.formatDecimal(item.product.effectivePrice.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 'COMMA', 0, 'POINT')}">₹0</span>
            </div>
            <div class="cart-item-remove">
                <form th:action="@{/cart/remove}" method="post">
                    <input type="hidden" name="cartItemId" th:value="${item.id}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="remove-btn" title="Remove">
                        <i class="bi bi-trash3"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Cart Summary -->
    <div class="cart-summary">
        <div class="summary-card">
            <h3 class="summary-title">Order Summary</h3>
            <div class="summary-row">
                <span>Subtotal (<span th:text="${cart.totalItems}">0</span> items)</span>
                <span th:text="'₹' + ${#numbers.formatDecimal(cart.totalPrice, 1, 'COMMA', 0, 'POINT')}">₹0</span>
            </div>
            <div class="summary-row">
                <span>Delivery</span>
                <span class="text-success">Free</span>
            </div>
            <div class="summary-row summary-total">
                <span>Total</span>
                <span th:text="'₹' + ${#numbers.formatDecimal(cart.totalPrice, 1, 'COMMA', 0, 'POINT')}">₹0</span>
            </div>
            <a href="/checkout" class="btn btn-primary btn-full btn-lg">
                <i class="bi bi-credit-card-fill"></i> Proceed to Checkout
            </a>
            <a href="/products" class="btn btn-ghost btn-full">
                <i class="bi bi-arrow-left"></i> Continue Shopping
            </a>

            <!-- Clear Cart -->
            <form th:action="@{/cart/clear}" method="post" class="clear-cart-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="clear-cart-btn" onclick="return confirm('Clear all items?')">
                    <i class="bi bi-trash3"></i> Clear Cart
                </button>
            </form>
        </div>

        <!-- Trust badges -->
        <div class="trust-badges">
            <div class="trust-badge"><i class="bi bi-shield-check"></i> Secure Checkout</div>
            <div class="trust-badge"><i class="bi bi-truck"></i> Free Delivery</div>
            <div class="trust-badge"><i class="bi bi-arrow-counterclockwise"></i> Easy Returns</div>
        </div>
    </div>
</div>

<!-- Empty Cart -->
<div class="container empty-cart" th:if="${cart == null or cart.items.isEmpty()}">
    <div class="empty-cart-icon"><i class="bi bi-bag-x"></i></div>
    <h2>Your cart is empty</h2>
    <p>Looks like you haven't added anything to your cart yet.</p>
    <a href="/products" class="btn btn-primary btn-lg">
        <i class="bi bi-bag-plus"></i> Start Shopping
    </a>
</div>

<div th:replace="~{layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
<script>
    function updateQty(btn, delta, maxQty) {
        const form = btn.closest('.qty-form');
        const input = form.querySelector('.qty-input');
        const newVal = parseInt(input.value) + delta;
        if (newVal >= 1 && newVal <= maxQty) {
            input.value = newVal;
            form.submit();
        }
    }
</script>
</body>
</html>
