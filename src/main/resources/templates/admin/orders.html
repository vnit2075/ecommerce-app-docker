<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | ShopEZ Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-brand">
        <span class="brand-icon"><i class="bi bi-bag-heart-fill"></i></span>
        <span class="brand-text">ShopEZ Admin</span>
    </div>
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/products" class="admin-nav-link"><i class="bi bi-box-seam"></i> Products</a>
        <a href="/admin/categories" class="admin-nav-link"><i class="bi bi-tags"></i> Categories</a>
        <a href="/admin/orders" class="admin-nav-link active"><i class="bi bi-receipt"></i> Orders</a>
        <a href="/admin/users" class="admin-nav-link"><i class="bi bi-people"></i> Users</a>
        <hr class="admin-divider">
        <a href="/" class="admin-nav-link"><i class="bi bi-shop"></i> View Store</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="admin-nav-link logout-link"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
</aside>
<main class="admin-main">
    <div class="admin-topbar">
        <h1 class="admin-page-title"><i class="bi bi-receipt"></i> Manage Orders</h1>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div class="admin-card">
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th>Update Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td><a th:href="@{'/orders/' + ${order.id}}" th:text="${order.orderNumber}">ORD-000</a></td>
                        <td>
                            <strong th:text="${order.user?.fullName}">Customer</strong><br>
                            <small th:text="${order.user?.email}">email</small>
                        </td>
                        <td th:text="${#temporals.format(order.createdAt, 'dd MMM yy HH:mm')}">Date</td>
                        <td th:text="${order.items.size()} + ' items'">0</td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}">₹0</td>
                        <td th:text="${order.paymentMethod?.name()?.replace('_', ' ')}">COD</td>
                        <td>
                            <span class="order-status" th:classappend="'status-' + ${order.status.name().toLowerCase()}"
                                  th:text="${order.status}">PENDING</span>
                        </td>
                        <td>
                            <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <select name="status" class="form-input-sm">
                                    <option th:each="s : ${orderStatuses}" th:value="${s.name()}"
                                            th:text="${s.name()}" th:selected="${order.status == s}">STATUS</option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-xs">Update</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${orders.isEmpty()}">
                        <td colspan="8" class="text-center">No orders yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
