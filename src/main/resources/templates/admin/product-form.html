<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | ShopEZ Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-brand">
        <span class="brand-icon"><i class="bi bi-bag-heart-fill"></i></span>
        <span class="brand-text">ShopEZ Admin</span>
    </div>
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/products" class="admin-nav-link active"><i class="bi bi-box-seam"></i> Products</a>
        <a href="/admin/categories" class="admin-nav-link"><i class="bi bi-tags"></i> Categories</a>
        <a href="/admin/orders" class="admin-nav-link"><i class="bi bi-receipt"></i> Orders</a>
        <a href="/admin/users" class="admin-nav-link"><i class="bi bi-people"></i> Users</a>
        <hr class="admin-divider">
        <a href="/" class="admin-nav-link"><i class="bi bi-shop"></i> View Store</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="admin-nav-link logout-link"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
</aside>
<main class="admin-main">
    <div class="admin-topbar">
        <h1 class="admin-page-title"><i class="bi bi-pencil"></i> Edit Product</h1>
        <a href="/admin/products" class="btn btn-outline"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="admin-card" th:if="${product != null}">
        <form th:action="@{/admin/products/save}" method="post" class="admin-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${product.id}">
            <div class="admin-form-grid">
                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input type="text" name="name" th:value="${product.name}" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Brand</label>
                    <input type="text" name="brand" th:value="${product.brand}" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select name="categoryId" class="form-input" required>
                        <option th:each="cat : ${categories}" th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category?.id == cat.id}">Cat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" name="price" th:value="${product.price}" class="form-input" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Discount Price (₹)</label>
                    <input type="number" name="discountPrice" th:value="${product.discountPrice}" class="form-input" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Quantity *</label>
                    <input type="number" name="stockQuantity" th:value="${product.stockQuantity}" class="form-input" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" name="imageUrl" th:value="${product.imageUrl}" class="form-input">
                </div>
                <div class="form-group form-check-group">
                    <label class="form-label">Options</label>
                    <div class="check-group">
                        <label class="check-label">
                            <input type="checkbox" name="featured" th:checked="${product.featured}"> Featured
                        </label>
                        <label class="check-label">
                            <input type="checkbox" name="active" th:checked="${product.active}"> Active
                        </label>
                    </div>
                </div>
                <div class="form-group form-full">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-input" rows="3" th:text="${product.description}"></textarea>
                </div>
            </div>
            <div class="admin-form-actions">
                <button type="submit" class="btn btn-primary"><i class="bi bi-floppy"></i> Save Changes</button>
                <a href="/admin/products" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
