<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | ShopEZ Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-brand">
        <span class="brand-icon"><i class="bi bi-bag-heart-fill"></i></span>
        <span class="brand-text">ShopEZ Admin</span>
    </div>
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/products" class="admin-nav-link active"><i class="bi bi-box-seam"></i> Products</a>
        <a href="/admin/categories" class="admin-nav-link"><i class="bi bi-tags"></i> Categories</a>
        <a href="/admin/orders" class="admin-nav-link"><i class="bi bi-receipt"></i> Orders</a>
        <a href="/admin/users" class="admin-nav-link"><i class="bi bi-people"></i> Users</a>
        <hr class="admin-divider">
        <a href="/" class="admin-nav-link"><i class="bi bi-shop"></i> View Store</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="admin-nav-link logout-link"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
</aside>
<main class="admin-main">
    <div class="admin-topbar">
        <h1 class="admin-page-title"><i class="bi bi-box-seam"></i> Manage Products</h1>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <!-- Add Product Form -->
    <div class="admin-card">
        <div class="admin-card-header">
            <h2><i class="bi bi-plus-circle"></i> Add New Product</h2>
        </div>
        <form th:action="@{/admin/products/save}" method="post" class="admin-form" th:object="${newProduct}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="admin-form-grid">
                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input type="text" th:field="*{name}" class="form-input" placeholder="e.g. iPhone 15 Pro" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Brand</label>
                    <input type="text" th:field="*{brand}" class="form-input" placeholder="e.g. Apple">
                </div>
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select name="categoryId" class="form-input" required>
                        <option value="">-- Select Category --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Cat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" th:field="*{price}" class="form-input" placeholder="9999" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Discount Price (₹)</label>
                    <input type="number" th:field="*{discountPrice}" class="form-input" placeholder="Leave blank if no discount" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Quantity *</label>
                    <input type="number" th:field="*{stockQuantity}" class="form-input" placeholder="100" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" th:field="*{imageUrl}" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group form-check-group">
                    <label class="form-label">Options</label>
                    <div class="check-group">
                        <label class="check-label"><input type="checkbox" th:field="*{featured}"> Featured</label>
                        <label class="check-label"><input type="checkbox" th:field="*{active}" checked> Active</label>
                    </div>
                </div>
                <div class="form-group form-full">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-input" rows="3" placeholder="Product description..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Product</button>
        </form>
    </div>

    <!-- Products Table -->
    <div class="admin-card">
        <div class="admin-card-header">
            <h2><i class="bi bi-list-ul"></i> All Products (<span th:text="${products.size()}">0</span>)</h2>
        </div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td><img th:src="${product.imageUrl}" th:alt="${product.name}" class="admin-product-thumb"
                                 onerror="this.src='/images/no-image.png'"></td>
                        <td>
                            <strong th:text="${product.name}">Name</strong><br>
                            <small th:text="${product.brand}">Brand</small>
                        </td>
                        <td th:text="${product.category?.name}">Category</td>
                        <td>
                            <span th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">₹0</span>
                            <br>
                            <small th:if="${product.discountPrice != null}" class="text-success"
                                   th:text="'Offer: ₹' + ${#numbers.formatDecimal(product.discountPrice, 1, 'COMMA', 0, 'POINT')}"></small>
                        </td>
                        <td>
                            <span th:classappend="${product.stockQuantity > 0} ? 'badge badge-in-stock' : 'badge badge-out'"
                                  th:text="${product.stockQuantity} + ' units'">0</span>
                        </td>
                        <td>
                            <span th:if="${product.active}" class="badge badge-active">Active</span>
                            <span th:unless="${product.active}" class="badge badge-inactive">Inactive</span>
                            <span th:if="${product.featured}" class="badge badge-featured">⭐</span>
                        </td>
                        <td class="admin-actions">
                            <a th:href="@{'/products/' + ${product.id}}" class="btn btn-outline btn-xs" target="_blank">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{'/admin/products/' + ${product.id} + '/edit'}" class="btn btn-outline btn-xs">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{'/admin/products/' + ${product.id} + '/delete'}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-danger btn-xs"
                                        onclick="return confirm('Delete this product?')">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${products.isEmpty()}">
                        <td colspan="7" class="text-center">No products found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
