<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | ShopEZ Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-brand">
        <span class="brand-icon"><i class="bi bi-bag-heart-fill"></i></span>
        <span class="brand-text">ShopEZ Admin</span>
    </div>
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/products" class="admin-nav-link"><i class="bi bi-box-seam"></i> Products</a>
        <a href="/admin/categories" class="admin-nav-link active"><i class="bi bi-tags"></i> Categories</a>
        <a href="/admin/orders" class="admin-nav-link"><i class="bi bi-receipt"></i> Orders</a>
        <a href="/admin/users" class="admin-nav-link"><i class="bi bi-people"></i> Users</a>
        <hr class="admin-divider">
        <a href="/" class="admin-nav-link"><i class="bi bi-shop"></i> View Store</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="admin-nav-link logout-link"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
</aside>
<main class="admin-main">
    <div class="admin-topbar">
        <h1 class="admin-page-title"><i class="bi bi-tags"></i> Manage Categories</h1>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div class="admin-card">
        <div class="admin-card-header"><h2><i class="bi bi-plus-circle"></i> Add Category</h2></div>
        <form th:action="@{/admin/categories/save}" method="post" class="admin-form" th:object="${newCategory}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="admin-form-grid">
                <div class="form-group">
                    <label class="form-label">Category Name *</label>
                    <input type="text" th:field="*{name}" class="form-input" placeholder="e.g. Electronics" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Image URL</label>
                    <input type="text" th:field="*{imageUrl}" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group form-full">
                    <label class="form-label">Description</label>
                    <input type="text" th:field="*{description}" class="form-input" placeholder="Short description">
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Category</button>
        </form>
    </div>
    <div class="admin-card">
        <div class="admin-card-header"><h2><i class="bi bi-list-ul"></i> All Categories</h2></div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead><tr><th>Image</th><th>Name</th><th>Description</th><th>Products</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="cat : ${categories}">
                        <td>
                            <img th:src="${cat.imageUrl}" th:alt="${cat.name}" class="admin-product-thumb"
                                 onerror="this.src='/images/no-image.png'" th:if="${cat.imageUrl != null}">
                        </td>
                        <td th:text="${cat.name}">Category</td>
                        <td th:text="${cat.description}">Description</td>
                        <td th:text="${cat.products?.size() ?: 0} + ' products'">0</td>
                        <td><span th:if="${cat.active}" class="badge badge-active">Active</span>
                            <span th:unless="${cat.active}" class="badge badge-inactive">Inactive</span></td>
                    </tr>
                    <tr th:if="${categories.isEmpty()}"><td colspan="5" class="text-center">No categories</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
