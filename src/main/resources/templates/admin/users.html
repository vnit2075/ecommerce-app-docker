<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users | ShopEZ Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
    <div class="admin-brand">
        <span class="brand-icon"><i class="bi bi-bag-heart-fill"></i></span>
        <span class="brand-text">ShopEZ Admin</span>
    </div>
    <nav class="admin-nav">
        <a href="/admin/dashboard" class="admin-nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/products" class="admin-nav-link"><i class="bi bi-box-seam"></i> Products</a>
        <a href="/admin/categories" class="admin-nav-link"><i class="bi bi-tags"></i> Categories</a>
        <a href="/admin/orders" class="admin-nav-link"><i class="bi bi-receipt"></i> Orders</a>
        <a href="/admin/users" class="admin-nav-link active"><i class="bi bi-people"></i> Users</a>
        <hr class="admin-divider">
        <a href="/" class="admin-nav-link"><i class="bi bi-shop"></i> View Store</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="admin-nav-link logout-link"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </form>
    </nav>
</aside>
<main class="admin-main">
    <div class="admin-topbar">
        <h1 class="admin-page-title"><i class="bi bi-people"></i> Manage Users</h1>
    </div>
    <div class="admin-card">
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th><th>Status</th></tr></thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.fullName}">Name</td>
                        <td th:text="${u.email}">email@example.com</td>
                        <td th:text="${u.phone}">Phone</td>
                        <td>
                            <span th:classappend="${u.role.name() == 'ADMIN'} ? 'badge badge-admin' : 'badge badge-customer'"
                                  th:text="${u.role}">ROLE</span>
                        </td>
                        <td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}">Date</td>
                        <td><span th:if="${u.active}" class="badge badge-active">Active</span>
                            <span th:unless="${u.active}" class="badge badge-inactive">Inactive</span></td>
                    </tr>
                    <tr th:if="${users.isEmpty()}"><td colspan="7" class="text-center">No users found</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
